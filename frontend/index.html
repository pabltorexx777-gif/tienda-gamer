<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda Gamer</title>

  <style>

    body {
      font-family: Arial;
      background: #0d0d0d;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #00ffcc;
    }

    .login-container {

  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;

}

.login-container input {

  padding: 10px;
  width: 200px;
  border: none;
  border-radius: 5px;

}

.login-container button {

  background: #00ffcc;
  border: none;
  padding: 10px 20px;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;

}

    .formulario {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .formulario input {
      padding: 10px;
      width: 200px;
      border: none;
      border-radius: 5px;
    }

    .formulario button {
      background: #00ffcc;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .contenedor-principal {
      display: flex;
      gap: 20px;
      margin-top: 30px;
      align-items: flex-start;
    }

    .productos {
      flex: 1;

      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

      gap: 20px;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #333;
    }

    .card h2 {
      margin: 0;
      color: #00ffcc;
    }

    .precio {
      font-size: 22px;
      margin-top: 10px;
    }

    .acciones {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .acciones button {
      flex: 1;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      min-width: 80px;
    }

    .acciones button:nth-child(1) {
      background: #00b894;
      color: white;
    }

    .acciones button:nth-child(2) {
      background: orange;
    }

    .acciones button:nth-child(3) {
      background: crimson;
      color: white;
    }

    .carrito {
      width: 300px;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #333;
      position: sticky;
      top: 20px;
    }

    .carrito-item {
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
    }

    .carrito-item button {
      margin-top: 5px;
      background: crimson;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

  </style>

</head>

<body>

  <h1>Tienda Gamer 🎮</h1>

  <div class="login-container">

  <input
    type="email"
    id="login-email"
    placeholder="Correo"
  >

  <input
    type="password"
    id="login-password"
    placeholder="Contraseña"
  >

  <button onclick="login()">
    Iniciar Sesión
  </button>

  <button onclick="logout()">
    Cerrar Sesión
  </button>

</div>

  <div class="formulario">

    <input
      type="text"
      id="nombre"
      placeholder="Nombre del producto"
    >

    <input
      type="number"
      id="precio"
      placeholder="Precio"
    >

    <button onclick="agregarProducto()">
      Agregar Producto
    </button>

  </div>

  <div class="contenedor-principal">

    <div class="productos" id="productos"></div>

    <div class="carrito">

      <h2>🛒 Carrito</h2>

      <div id="lista-carrito"></div>

      <h3 id="total">
        Total: $0
      </h3>

    </div>

  </div>

  <script>

    let carrito = JSON.parse(localStorage.getItem('carrito')) || [];

    let token = localStorage.getItem('token') || '';

    async function login() {

  const email = document.getElementById('login-email').value;

  const password = document.getElementById('login-password').value;

  try {

    const respuesta = await fetch('http://localhost:3000/login', {

      method: 'POST',

      headers: {
        'Content-Type': 'application/json'
      },

      body: JSON.stringify({
        email,
        password
      })

    });

    const data = await respuesta.json();

    if (data.token) {

      token = data.token;

      localStorage.setItem('token', token);

      alert('Login correcto 🔥');

      mostrarBotonesAdmin();

    } else {

      alert(data.error || 'Error login');

    }

  } catch (error) {

    console.error(error);

  }

}

function logout() {

  token = '';

  localStorage.removeItem('token');

  alert('Sesión cerrada');

  mostrarBotonesAdmin();

}
    
    async function cargarProductos() {

      try {

        const respuesta = await fetch('http://localhost:3000/products');

        const productos = await respuesta.json();

        const contenedor = document.getElementById('productos');

        contenedor.innerHTML = '';

        productos.forEach(producto => {

          contenedor.innerHTML += `
          
            <div class="card">

              <h2>${producto.nombre}</h2>

              <div class="precio">
                $${producto.precio}
              </div>

              <div class="acciones">

                <button onclick="agregarAlCarrito(${producto.id}, '${producto.nombre}', ${producto.precio})">
                  🛒 Carrito
                </button>

                <button class="admin-btn" onclick="editarProducto(${producto.id}, '${producto.nombre}', ${producto.precio})">
                  Editar
                </button>

                <button class="admin-btn" onclick="eliminarProducto(${producto.id})">
                  Eliminar
                </button>

              </div>

            </div>

          `;

        });

      } catch (error) {
        console.error(error);
      }

    }

    async function agregarProducto() {

      const nombre = document.getElementById('nombre').value;

      const precio = document.getElementById('precio').value;

      if (!nombre || !precio) {
        alert('Completa todos los campos');
        return;
      }

      try {

        await fetch('http://localhost:3000/products', {

          method: 'POST',

          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },

          body: JSON.stringify({
            nombre,
            precio
          })

        });

        document.getElementById('nombre').value = '';

        document.getElementById('precio').value = '';

        cargarProductos();

      } catch (error) {
        console.error(error);
      }

    }

    async function editarProducto(id, nombreActual, precioActual) {

      const nuevoNombre = prompt(
        'Nuevo nombre:',
        nombreActual
      );

      const nuevoPrecio = prompt(
        'Nuevo precio:',
        precioActual
      );

      if (!nuevoNombre || !nuevoPrecio) {
        return;
      }

      try {

        await fetch(`http://localhost:3000/products/${id}`, {

          method: 'PUT',

          headers: {
            'Content-Type': 'application/json'
          },

          body: JSON.stringify({
            nombre: nuevoNombre,
            precio: nuevoPrecio
          })

        });

        cargarProductos();

      } catch (error) {
        console.error(error);
      }

    }

    async function eliminarProducto(id) {

      try {

        await fetch(`http://localhost:3000/products/${id}`, {
          method: 'DELETE'
        });

        cargarProductos();

      } catch (error) {
        console.error(error);
      }

    }

    function mostrarBotonesAdmin() {

  const botonesAdmin = document.querySelectorAll('.admin-btn');

  botonesAdmin.forEach(boton => {

    if (token) {

      boton.style.display = 'block';

    } else {

      boton.style.display = 'none';

    }

  });

}
    
    function agregarAlCarrito(id, nombre, precio) {

      carrito.push({
        id,
        nombre,
        precio
      });

      localStorage.setItem('carrito', JSON.stringify(carrito));

      renderizarCarrito();
    }

    function renderizarCarrito() {

      const lista = document.getElementById('lista-carrito');

      const totalElemento = document.getElementById('total');

      lista.innerHTML = '';

      let total = 0;

      carrito.forEach((producto, index) => {

        total += Number(producto.precio);

        lista.innerHTML += `
        
          <div class="carrito-item">

            <strong>${producto.nombre}</strong>

            <p>$${producto.precio}</p>

            <button onclick="eliminarDelCarrito(${index})">
              Quitar
            </button>

          </div>

        `;

      });

      totalElemento.innerHTML = `
        Total: $${total}
      `;
    }

    function eliminarDelCarrito(index) {

      carrito.splice(index, 1);

      localStorage.setItem('carrito', JSON.stringify(carrito));

      renderizarCarrito();
    }

    cargarProductos();

    renderizarCarrito();

    mostrarBotonesAdmin();

  </script>

</body>

</html>
